<head>
  <script type="module" src="hillshade.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main {
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    canvas {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid black;
    }
    .reflectance-map {
      position: absolute;
      left: 0px;
      bottom: 0px;
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>
  <div class="main">
    <canvas id="dem" width="512" height="512"></canvas>
    <canvas id="best-fit" width="512" height="512"></canvas>
    <canvas id="fourier" width="512" height="512"></canvas>

    <div style="position: relative">
      <canvas id="hillshade-1" width="512" height="512"></canvas>
      <canvas
        id="reflectance-1"
        width="512"
        height="512"
        class="reflectance-map"
      ></canvas>
    </div>
    <div style="position: relative">
      <canvas id="hillshade-2" width="512" height="512"></canvas>
      <canvas
        id="reflectance-2"
        width="512"
        height="512"
        class="reflectance-map"
      ></canvas>
    </div>
    <canvas id="normal" width="512" height="512"></canvas>

    <input id="theta-1" type="range" min="0" max="360" />
    <input id="theta-2" type="range" min="0" max="360" />
    <button id="reconstruct">reconstruct</button>
  </div>
</body>
