<head>
  <script type="module" src="hillshade.js"></script>
</head>
<body>
  <div style="display: flex; gap: 10px">
    <div>
      <canvas id="dem" width="200" height="200"></canvas>
      <div style="display: flex; gap: 4px">
        <div>
          <div>
            <canvas id="hillshade-1" width="200" height="200"></canvas>
          </div>
          <div>
            <canvas id="reflectance-1" width="200" height="200"></canvas>
          </div>
          <div>
            <input id="theta-1" type="range" min="0" max="360" />
          </div>
        </div>
        <div>
          <div>
            <canvas id="hillshade-2" width="200" height="200"></canvas>
          </div>
          <div>
            <canvas id="reflectance-2" width="200" height="200"></canvas>
          </div>
          <div>
            <input id="theta-2" type="range" min="0" max="360" />
          </div>
        </div>
      </div>
    </div>
    <div>
      <canvas id="normal" width="200" height="200"></canvas>
      <div>
        <button id="compute-normal">compute normal</button>
      </div>
    </div>
  </div>
</body>
